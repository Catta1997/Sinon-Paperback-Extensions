name: Generate README

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate README
        run: node genReadme.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet || git commit -m "Update README"
          git push
